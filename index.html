<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🏏 T20 Cricket – India vs Pakistan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1f2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            margin: 0;
            padding: 10px;
        }
        #app {
            width: 100%;
            max-width: 500px;
            background: #1a2e3f;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            position: relative;
            min-height: 700px;
            color: #fff;
        }
        .screen {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .screen.active {
            display: flex;
        }
        .btn {
            background: #f5c842;
            color: #1a2e3f;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            transform: none;
            pointer-events: none;
        }
        .btn-secondary {
            background: #2a4055;
            color: #fff;
        }
        .btn-green {
            background: #4caf50;
            color: #fff;
        }
        .btn-red {
            background: #f44336;
            color: #fff;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .field-toggle-btn {
            flex: 1;
            background: #2a4055;
            color: #fff;
            border: 2px solid #f5c84255;
            padding: 9px 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .field-toggle-btn:active {
            transform: scale(0.96);
        }
        .field-toggle-btn.active {
            background: #f5c842;
            color: #1a2e3f;
            border-color: #f5c842;
        }
        #field-controls-container {
            background: rgba(26, 46, 63, 0.6);
            border: 1px solid #f5c84233;
            border-radius: 12px;
            padding: 10px;
        }
        #menu-screen h1 {
            text-align: center;
            font-size: 2rem;
            color: #f5c842;
            text-shadow: 0 0 12px #f5c84255;
        }
        .flag-container {
            display: flex;
            justify-content: space-around;
            margin: 12px 0;
        }
        .flag-card {
            background: #2a4055;
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            width: 44%;
            border: 3px solid transparent;
        }
        .flag-card.selected {
            border-color: #f5c842;
            background: #34556b;
            transform: scale(1.02);
        }
        .flag-card img {
            width: 70px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #fff;
        }
        .flag-card span {
            display: block;
            margin-top: 6px;
            font-weight: bold;
            font-size: 1rem;
        }
        .over-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 8px 0;
        }
        .over-btn {
            background: #2a4055;
            border: 2px solid transparent;
            padding: 10px 16px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            min-width: 70px;
            text-align: center;
        }
        .over-btn.active {
            border-color: #f5c842;
            background: #34556b;
        }
        .over-btn small {
            display: block;
            font-size: 0.6rem;
            color: #aaa;
        }
        .diff-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 8px 0;
        }
        .diff-btn {
            background: #2a4055;
            border: 2px solid transparent;
            padding: 10px 12px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            min-width: 70px;
            text-align: center;
            font-size: 0.85rem;
        }
        .diff-btn small {
            display: block;
            font-size: 0.6rem;
            color: #aaa;
        }
        .diff-btn[data-difficulty="easy"].active {
            border-color: #4caf50;
            background: #234b2c;
        }
        .diff-btn[data-difficulty="medium"].active {
            border-color: #f5c842;
            background: #34556b;
        }
        .diff-btn[data-difficulty="hard"].active {
            border-color: #f44336;
            background: #4b2626;
        }
        #selection-screen h2,
        #opener-screen h2 {
            text-align: center;
            color: #f5c842;
        }
        .player-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 340px;
            overflow-y: auto;
            padding: 4px;
        }
        .player-card {
            background: #2a4055;
            padding: 8px 4px 6px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
        }
        .player-card.selected {
            border-color: #4caf50;
            background: #1e4a2a;
            transform: scale(1.03);
        }
        .player-card.opener-selected {
            border-color: #f5c842;
            background: #34556b;
            transform: scale(1.04);
        }
        .player-card .avatar-wrap {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            background: #1a2e3f;
            border: 2px solid rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }
        .player-card .p-name {
            font-weight: 600;
            line-height: 1.15;
        }
        .player-card .role {
            background: #1a2e3f;
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 0.55rem;
            color: #aaa;
        }
        #pick-count,
        #opener-count {
            text-align: center;
            font-weight: bold;
            color: #f5c842;
        }
        #toss-screen {
            text-align: center;
        }
        .coin {
            font-size: 5rem;
            margin: 10px 0;
            transition: transform 0.6s;
        }
        .coin.flip {
            animation: flip 0.6s ease-in-out;
        }
        @keyframes flip {
            0% {
                transform: rotateY(0deg);
            }
            50% {
                transform: rotateY(180deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
        .toss-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 10px 0;
        }
        .toss-options .btn {
            font-size: 1.8rem;
            padding: 8px 24px;
            min-width: 80px;
        }
        .toss-decision {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .toss-result {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f5c842;
            min-height: 30px;
        }
        #game-screen {
            gap: 6px;
        }
        #scoreboard {
            display: flex;
            justify-content: space-between;
            background: #0f1f2b;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            flex-wrap: wrap;
            align-items: center;
        }
        #scoreboard .team {
            font-weight: bold;
        }
        #scoreboard .runs {
            color: #f5c842;
            font-size: 1.2rem;
        }
        #status-banner {
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            font-size: 0.95rem;
            background: #2a4055;
        }
        #status-banner.batting {
            background: #2e7d32;
        }
        #status-banner.bowling {
            background: #c62828;
        }
        #status-banner.ai-bowling {
            background: #f9a825;
            color: #1a2e3f;
        }
        #status-banner.ai-batting {
            background: #1565c0;
        }

        .pitch-stage {
            position: relative;
            width: 100%;
        }
        #pitch-canvas {
            width: 100%;
            height: 68vh;
            max-height: 620px;
            min-height: 420px;
            background: #2e7d32;
            border-radius: 16px;
            border: 3px solid #4caf50;
            touch-action: none;
            cursor: pointer;
            display: block;
        }
        .stage-overlay-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }
        .pitch-figure {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.35));
            z-index: 2;
        }
        .figure-batsman {
            left: 48%;
            top: 72%;
            width: 74px;
            height: 120px;
            transform: translate(-50%, -66%);
            transform-origin: 50% 88%;
            transition: left 0.2s, transform 0.15s ease;
        }
        .figure-batsman.walking {
            animation: walkToPavilion 2.8s ease-in forwards;
        }
        @keyframes walkToPavilion {
            0% {
                transform: translate(-50%, -66%) scale(1) rotate(0deg);
                opacity: 1;
            }
            40% {
                transform: translate(-40%, -30%) scale(1.02) rotate(-6deg);
                opacity: 1;
            }
            100% {
                transform: translate(20%, 80%) scale(0.6) rotate(12deg);
                opacity: 0;
            }
        }
        .figure-bowler {
            left: 48%;
            top: 5%;
            width: 56px;
            height: 94px;
            transform: translate(-50%, -8%);
            transition: transform 0.12s ease;
        }
        .figure-bowler.run-up-1 {
            transform: translate(-56%, -8%) rotate(-4deg);
        }
        .figure-bowler.run-up-2 {
            transform: translate(-42%, -6%) rotate(4deg);
        }
        .figure-bowler.delivering {
            transform: translate(-50%, -4%) rotate(-8deg) scale(1.04);
        }
        .figure-bowler.celebrating {
            animation: bowlerCelebrate 2.4s ease-in-out;
        }
        @keyframes bowlerCelebrate {
            0% {
                transform: translate(-50%, -8%) rotate(0deg) scale(1);
            }
            15% {
                transform: translate(-50%, -32%) rotate(-12deg) scale(1.18);
            }
            30% {
                transform: translate(-50%, -8%) rotate(10deg) scale(1.05);
            }
            45% {
                transform: translate(-50%, -28%) rotate(-9deg) scale(1.14);
            }
            60% {
                transform: translate(-50%, -8%) rotate(7deg) scale(1.05);
            }
            80% {
                transform: translate(-50%, -16%) rotate(-4deg) scale(1.05);
            }
            100% {
                transform: translate(-50%, -8%) rotate(0deg) scale(1);
            }
        }
        .celebration-burst {
            position: absolute;
            font-size: 2rem;
            left: 48%;
            top: 5%;
            transform: translate(-50%, -50%);
            animation: burstFloat 1.6s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes burstFloat {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0;
            }
            30% {
                transform: translate(-50%, -160%) scale(1.3);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -280%) scale(1);
                opacity: 0;
            }
        }
        .figure-keeper {
            left: 35%;
            top: 82%;
            width: 40px;
            height: 55px;
            transform: translate(-50%, -30%);
        }
        .figure-umpire {
            left: 60%;
            top: 6%;
            width: 34px;
            height: 62px;
            transform: translate(-50%, -8%);
            opacity: 0.95;
        }
        .result-banner {
            position: absolute;
            left: 50%;
            top: 38%;
            transform: translate(-50%, -50%) scale(0.5);
            padding: 10px 26px;
            border-radius: 14px;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            text-align: center;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
            transition: opacity 0.15s ease, transform 0.15s ease;
            white-space: nowrap;
        }
        .result-banner.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .result-banner.out {
            background: #c62828;
            box-shadow: 0 0 30px #c6282888;
        }
        .result-banner.four {
            background: #2e7d32;
            box-shadow: 0 0 30px #2e7d3288;
        }
        .result-banner.six {
            background: #1565c0;
            box-shadow: 0 0 30px #1565c088;
        }
        .result-banner.info {
            background: #37474f;
            font-size: 1.1rem;
            box-shadow: 0 0 20px #37474f88;
        }
        #powerplay-banner {
            position: absolute;
            left: 50%;
            top: 14%;
            transform: translate(-50%, -50%) scale(0.5);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            color: #1a2e3f;
            background: #f5c842;
            opacity: 0;
            pointer-events: none;
            z-index: 21;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 0 24px #f5c84288;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #powerplay-banner.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ---- D-Pads ---- */
        #dpad-container {
            position: fixed;
            right: max(6px, calc(50vw - 250px + 6px));
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 40;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #dpad-container.dpad-disabled {
            opacity: 0.35;
        }
        #dpad-container.dpad-disabled .dpad-btn {
            pointer-events: none !important;
        }
        #bowl-dpad-container {
            position: fixed;
            left: max(6px, calc(50vw - 250px + 6px));
            top: 18%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 40;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #bowl-dpad-container .dpad-btn {
            pointer-events: auto;
            background: rgba(42, 64, 85, 0.85);
            color: #fff;
            border: 2px solid #f5c84255
